kind = "web"
previewPath = "/"
title = "HYDROGES - Échange de Documents"
version = "1.0.0"
id = "artifacts/hydroges-docs"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26071

[services.development]
run = "pnpm --filter @workspace/hydroges-docs run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hydroges-docs", "run", "build" ]
publicDir = "artifacts/hydroges-docs/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26071"
BASE_PATH = "/"
